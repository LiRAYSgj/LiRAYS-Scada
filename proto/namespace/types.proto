syntax = "proto3";

package namespace;

import "namespace/enums.proto";

message Value {
  oneof typed {
    int64 integer_value = 1;
    double float_value = 2;
    string text_value = 3;
    bool boolean_value = 4;
  }
}

// Protobuf repeated fields cannot directly contain optional messages
// without a wrapper.
message OptionalValue {
  Value value = 1; // If this field is not set, it implies None
}

message ChildInfo {
  string child_id = 1;
  ItemType i_type = 2;
  optional VarDataType var_d_type = 3;
}

message ItemMeta {
  string name = 1;
  ItemType i_type = 2;
  optional VarDataType var_d_type = 3;
  optional string unit = 4;
  optional double min = 5;  // For number variables only
  optional double max = 6;  // For number variables only
  repeated string options = 7;  // For string variables only
  repeated uint64 max_len = 8;  // For string variables only
}

message FolderInfo {
  string id = 1;
  string name = 2;
}

message VarInfo {
  string id = 1;
  string name = 2;
  VarDataType var_d_type = 3;
  optional string unit = 4;
  optional double min = 5;
  optional double max = 6;
  repeated string options = 7;
  repeated uint64 max_len = 8;
}

message VarIdValue {
  string var_id = 1;
  Value value = 2;
}

message NamespaceSchema {
  map<string, NamespaceNode> roots = 1;
}

message NamespaceNode {
  oneof node {
    NamespaceFolder folder = 1;
    NamespaceVariable variable = 2;
  }
}

message NamespaceFolder {
  map<string, NamespaceNode> children = 1;
}

message NamespaceVariable {
  VarDataType var_d_type = 1;
  optional string unit = 2;
  optional double min = 3;
  optional double max = 4;
  repeated string options = 5;
  repeated uint64 max_len = 6;
}
