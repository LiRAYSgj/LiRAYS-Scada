# ---------------------------------------------------------------------------
# LiRAYS SCADA - Default Configuration (Debian based systems)
# ---------------------------------------------------------------------------
# Installed under /etc/lirays-scada/settings.default.yaml. On first install,
# postinst copies it to settings.yaml only if that file does not exist. User
# edits settings.yaml; package upgrades do not overwrite it.
# ---------------------------------------------------------------------------

server:
  # Host interface for HTTP + WebSocket.
  # Env: BIND_HOST
  bind_host: 127.0.0.1

  # Port for both HTTP and WebSocket on the unified server.
  # Env: BIND_PORT
  bind_port: 8245

paths:
  # Root data directory. Contains:
  #   - Dynamic data
  #   - Static data
  #   - certificates/ (self-signed TLS when auto enabled)
  # Env: DATA_DIR
  data_dir: /var/lib/lirays-scada/data

tls:
  # Enable TLS for BOTH HTTP and WebSocket endpoints.
  # Env: TLS_ENABLE
  enabled: false

  # Auto-generate a self-signed cert/key under ${data_dir}/certificates
  # when enabled=true and cert/key not provided.
  # Env: TLS_AUTO
  auto: true

  # Path to PEM certificate file (used when enabled=true and auto=false).
  # Env: TLS_CERT_PATH
  cert_path: null

  # Path to PEM private key file (used when enabled=true and auto=false).
  # Env: TLS_KEY_PATH
  key_path: null

metrics:
  # Write rolling snapshot metrics to ${data_dir}/metrics/metrics_rt.txt.
  # Env: METRICS_REAL_TIME
  real_time: false

  # Append history metrics to ${data_dir}/metrics/metrics_hist.csv.
  # Env: METRICS_HISTORIC
  historic: false

persistence:
  # Interval in milliseconds to flush dirty values to sled. Minimum value is 5000 (5 seconds).
  # Any value less that 5000 will be trimmed to 5 seconds.
  # Env: PERSIST_FLUSH_MS
  flush_ms: 15000

logger:
  # Global log verbosity level.
  # Env: LOGGER_LEVEL
  # Values: off, error, warn, info, debug, trace
  level: info

auth:
  # Enable session-protected UI/API. When enabled and no admin exists,
  # first visit redirects to /auth/setup to create the admin password.
  # Env: AUTH_ENABLED
  enabled: false
  # NOTE: If you enable auth, you MUST set auth.secret (or AUTH_SECRET env).

  # HMAC secret for the session cookie. Required when auth.enabled=true.
  # Env: AUTH_SECRET
  secret: null

  # Access token/session TTL in seconds.
  access_ttl: 3600

  # Refresh token/session TTL in seconds.
  refresh_ttl: 86400
