<div class="panel gauge-panel {{has_value_class}}">
  <div class="gauge-wrap">
    <svg
      viewBox="0 0 100 100"
      class="gauge-svg"
      aria-hidden="true"
      focusable="false"
    >
      <defs>
        <clipPath id="gauge-face-clip">
          <circle cx="50" cy="50" r="45.55" />
        </clipPath>
      </defs>
      <circle class="gauge-face-fill" cx="50" cy="50" r="46" />
      <path
        class="gauge-lower"
        clip-path="url(#gauge-face-clip)"
        d="m 26,58 c -5.5,0 -17,14 -17.2,14.3 8.2,13.7 23.8,22.2 41.2,22.2 17.4,0 33,-8.5 41.2,-22.2 -0.2,-0.3 -11.7,-14.3 -17.2,-14.3 z"
      />
      <circle class="gauge-face-border" cx="50" cy="50" r="46" />
      <g class="gauge-ticks">{{{ticks_html}}}</g>
      <line
        class="gauge-needle"
        x1="50"
        y1="50"
        x2="50"
        y2="19"
        style="--gauge-angle: {{angle}}deg;"
      />
      <circle class="gauge-hub" cx="50" cy="50" r="2.3" />
      <text class="gauge-value" x="50" y="70">{{value_label}}{{unit}}</text>
    </svg>
    <span
      class="gauge-scale left"
      style="--gauge-label-x: {{min_x}}%; --gauge-label-y: {{min_y}}%;"
      >{{min_label}}</span
    >
    <span
      class="gauge-scale right"
      style="--gauge-label-x: {{max_x}}%; --gauge-label-y: {{max_y}}%;"
      >{{max_label}}</span
    >
  </div>
</div>
