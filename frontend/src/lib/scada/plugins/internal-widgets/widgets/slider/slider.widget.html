<div class="panel slider-panel">
  <input
    data-widget-input="slider"
    type="range"
    min="{{range_min}}"
    max="{{range_max}}"
    step="{{range_step}}"
    value="{{command_slider_value}}"
  />
  <div class="slider-scale">
    <span>{{range_min_label}}</span>
    <strong>{{command_value_label}}</strong>
    <span>{{range_max_label}}</span>
  </div>
</div>
