<div class="panel onoff-panel">
  <button
    data-widget-input="toggle"
    class="toggle-button {{button_state_class}}"
    aria-label="{{button_aria_label}}"
    title="{{button_aria_label}}"
  >
    <svg
      class="power-icon"
      viewBox="0 0 24 24"
      fill="none"
      xmlns="http://www.w3.org/2000/svg"
      aria-hidden="true"
      focusable="false"
    >
      <path d="M12 2v10" />
      <path d="M18.4 6.6a9 9 0 1 1-12.8 0" />
    </svg>
    <span class="sr-only">{{state_aria_label}}</span>
  </button>
</div>
