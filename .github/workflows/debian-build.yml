name: Build Debian Packages

on:
  push:
    branches: [add-distribution-system]

jobs:
  build-debian:
    name: Build Debian Package
    strategy:
      matrix:
        arch: [amd64, arm64]
        os: [ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential devscripts protobuf-compiler equivs

      - name: Install NVM and Node.js 24
        run: |
          curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.4/install.sh | bash
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm install 24

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | bash -s -- -y
          source "$HOME/.cargo/env"
          rustc --version

      - name: Build Release
        run: |
          make clean
          make release

      - name: Build Debian Package
        run: |
          mk-build-deps -r
          debuild -b -us -uc
          rm -rf *.deb
          cp ../*.deb .
          ls -la *.deb

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lirays-scada-${{ matrix.arch }}.deb
          path: "*.deb"
          if-no-files-found: error

  create-release:
    name: Upload Release Assets
    needs: build-debian
    if: github.event_name == 'release'
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.LIRAYS_WRITE_TOKEN }}
